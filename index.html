<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0B5B57" />
  <meta name="description" content="Acceso Senior con IA — asistente para personas mayores" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>Acceso Senior</title>
</head>
<body>
  <div id="app">

    <!-- ===== VISTA CHAT (Consultante / FaciliBot) ===== -->
    <section id="view-chat" class="view active">
      <header class="topbar">
        <div class="brand">
          <span class="logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M5 4h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-8l-4 4v-4H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" fill="#FBFAF7"/>
              <circle cx="9.5" cy="10" r="1.6" fill="#0B5B57"/>
              <circle cx="15" cy="10" r="1.6" fill="#E29A3C"/>
            </svg>
          </span>
          <div>
            <h1>Acceso Senior</h1>
            <p class="subtitle">Asistente con IA</p>
          </div>
        </div>
        <button id="btn-panel" class="icon-btn" title="Panel de gestión" aria-label="Panel de gestión">👤</button>
      </header>

      <main id="messages" class="messages" aria-live="polite"></main>

      <form id="composer" class="composer" autocomplete="off">
        <button type="button" id="btn-mic" class="icon-btn mic" title="Hablar" aria-label="Dictar por voz">🎤</button>
        <input id="input" class="input" type="text" inputmode="text"
               placeholder="Escriba su mensaje aquí…" aria-label="Mensaje" />
        <button type="submit" id="btn-send" class="send-btn" aria-label="Enviar">➤</button>
      </form>
      <button id="btn-restart" class="restart">Empezar de nuevo</button>
    </section>

    <!-- ===== VISTA PANEL (Login Facilitador / Admin) ===== -->
    <section id="view-panel" class="view">
      <header class="topbar">
        <div class="brand">
          <span class="logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M5 4h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-8l-4 4v-4H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" fill="#FBFAF7"/>
              <circle cx="9.5" cy="10" r="1.6" fill="#0B5B57"/>
              <circle cx="15" cy="10" r="1.6" fill="#E29A3C"/>
            </svg>
          </span>
          <div>
            <h1 id="panel-title">Panel de gestión</h1>
            <p class="subtitle" id="panel-subtitle">Facilitadores y Administración</p>
          </div>
        </div>
        <button id="btn-back" class="icon-btn" title="Volver al asistente" aria-label="Volver">✕</button>
      </header>

      <!-- Login -->
      <div id="login-box" class="panel-content">
        <h2>Ingresar</h2>
        <form id="login-form" class="login-form" autocomplete="off">
          <label>Correo
            <input id="login-email" type="email" placeholder="correo@ejemplo.com" required />
          </label>
          <label>Contraseña
            <input id="login-pass" type="password" placeholder="••••" required />
          </label>
          <button type="submit" class="primary-btn">Entrar</button>
          <p id="login-error" class="error" hidden>Credenciales incorrectas.</p>
        </form>
        <details class="hint">
          <summary>Usuarios de prueba</summary>
          <ul>
            <li><b>juan@gmail.com</b> / 1234 — Admin</li>
            <li><b>juan_facilitador@gmail.com</b> / 1234 — Facilitador</li>
            <li><b>pepe@gmail.com</b> / 1234 — Consultante</li>
          </ul>
        </details>
      </div>

      <!-- Panel principal -->
      <div id="cases-box" class="panel-content" hidden>
        <div class="panel-tools">
          <span id="role-badge" class="badge"></span>
          <button id="btn-logout" class="text-btn">Salir</button>
        </div>

        <!-- Pestañas -->
        <div class="tabs">
          <button class="tab active" data-tab="tab-casos">Casos</button>
          <button class="tab" data-tab="tab-usuarios" id="tab-usuarios-btn" hidden>Usuarios</button>
        </div>

        <!-- Pestaña Casos -->
        <div id="tab-casos" class="tab-panel active">
          <div class="stats" id="stats"></div>
          <div class="filters" id="case-filters">
            <button class="chip active" data-filter="todos">Todos</button>
            <button class="chip" data-filter="mios">Mis casos</button>
            <button class="chip" data-filter="libres">Sin asignar</button>
          </div>
          <div id="cases-list" class="cases-list"></div>
        </div>

        <!-- Pestaña Usuarios (solo admin) -->
        <div id="tab-usuarios" class="tab-panel" hidden>
          <h2>Crear usuario</h2>
          <form id="create-user-form" class="login-form" autocomplete="off">
            <label>Nombre completo
              <input id="nu-nombre" type="text" placeholder="Nombre y apellido" required />
            </label>
            <label>Correo
              <input id="nu-email" type="email" placeholder="correo@ejemplo.com" required />
            </label>
            <label>DNI
              <input id="nu-dni" type="text" inputmode="numeric" placeholder="Solo números" required />
            </label>
            <label>Teléfono
              <input id="nu-telefono" type="text" inputmode="numeric" placeholder="Opcional" />
            </label>
            <label>Rol
              <select id="nu-rol">
                <option value="facilitador">Facilitador</option>
                <option value="consultante">Consultante</option>
                <option value="admin">Administrador</option>
              </select>
            </label>
            <label>Contraseña
              <input id="nu-pass" type="text" placeholder="Contraseña inicial" value="1234" required />
            </label>
            <button type="submit" class="primary-btn">Crear usuario</button>
            <p id="nu-msg" class="error" hidden></p>
          </form>

          <h2 style="margin-top:24px">Usuarios</h2>
          <div id="users-list" class="cases-list"></div>
        </div>
      </div>
    </section>

  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
