<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1f6feb" />
  <meta name="description" content="Acceso Senior con IA — asistente para personas mayores" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>Acceso Senior</title>
</head>
<body>
  <div id="app">

    <!-- ===== VISTA CHAT (Consultante / FaciliBot) ===== -->
    <section id="view-chat" class="view active">
      <header class="topbar">
        <div class="brand">
          <span class="logo">A</span>
          <div>
            <h1>Acceso Senior</h1>
            <p class="subtitle">Asistente con IA</p>
          </div>
        </div>
        <button id="btn-panel" class="icon-btn" title="Panel de gestión" aria-label="Panel de gestión">👤</button>
      </header>

      <main id="messages" class="messages" aria-live="polite"></main>

      <form id="composer" class="composer" autocomplete="off">
        <button type="button" id="btn-mic" class="icon-btn mic" title="Hablar" aria-label="Dictar por voz">🎤</button>
        <input id="input" class="input" type="text" inputmode="text"
               placeholder="Escriba su mensaje aquí…" aria-label="Mensaje" />
        <button type="submit" id="btn-send" class="send-btn" aria-label="Enviar">➤</button>
      </form>
      <button id="btn-restart" class="restart">Empezar de nuevo</button>
    </section>

    <!-- ===== VISTA PANEL (Login Facilitador / Admin) ===== -->
    <section id="view-panel" class="view">
      <header class="topbar">
        <div class="brand">
          <span class="logo">AS</span>
          <div>
            <h1 id="panel-title">Panel de gestión</h1>
            <p class="subtitle" id="panel-subtitle">Facilitadores y Administración</p>
          </div>
        </div>
        <button id="btn-back" class="icon-btn" title="Volver al asistente" aria-label="Volver">✕</button>
      </header>

      <!-- Login -->
      <div id="login-box" class="panel-content">
        <h2>Ingresar</h2>
        <form id="login-form" class="login-form" autocomplete="off">
          <label>Correo
            <input id="login-email" type="email" placeholder="correo@ejemplo.com" required />
          </label>
          <label>Contraseña
            <input id="login-pass" type="password" placeholder="••••" required />
          </label>
          <button type="submit" class="primary-btn">Entrar</button>
          <p id="login-error" class="error" hidden>Credenciales incorrectas.</p>
        </form>
        <details class="hint">
          <summary>Usuarios de prueba</summary>
          <ul>
            <li><b>juan@gmail.com</b> / 1234 — Admin</li>
            <li><b>juan_facilitador@gmail.com</b> / 1234 — Facilitador</li>
            <li><b>pepe@gmail.com</b> / 1234 — Consultante</li>
          </ul>
        </details>
      </div>

      <!-- Casos -->
      <div id="cases-box" class="panel-content" hidden>
        <div class="panel-tools">
          <span id="role-badge" class="badge"></span>
          <button id="btn-logout" class="text-btn">Salir</button>
        </div>
        <div class="stats" id="stats"></div>
        <h2>Casos</h2>
        <div id="cases-list" class="cases-list"></div>
      </div>
    </section>

  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
